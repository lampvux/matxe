<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">OVERLAYS — SCANLINES & DITHER</div>
    <div class="row" style="gap:18px">
      <div style="position:relative; width:260px; height:120px; background:var(--dmg-light); border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); overflow:hidden">
        <div style="position:absolute; inset:0; background:url('../assets/scanlines.svg'); image-rendering:pixelated"></div>
        <div class="disp" style="position:relative; color:var(--dmg-darkest); font-size:14px; padding:14px">CRT SCANLINES</div>
      </div>
      <div style="position:relative; width:260px; height:120px; background:var(--paper); color:var(--ink); border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); overflow:hidden">
        <div style="position:absolute; inset:0; color:var(--ink); background-image:url('../assets/dither-50.svg'); background-size:4px 4px; image-rendering:pixelated; opacity:0.3"></div>
        <div class="disp" style="position:relative; font-size:14px; padding:14px">50% DITHER</div>
      </div>
    </div></div></body></html>
