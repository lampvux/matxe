<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">SHADOWS — HARD BLOCK (NO BLUR)</div>
    <div class="row" style="gap:28px; align-items:center">
      <div style="background:var(--paper); border:2px solid var(--ink); padding:12px 18px; box-shadow:4px 4px 0 0 var(--ink)" class="disp">DEFAULT</div>
      <div style="background:var(--sunshine); border:2px solid var(--ink); padding:12px 18px; box-shadow:6px 6px 0 0 var(--ink)" class="disp">LARGE</div>
      <div style="background:var(--paper); border:2px solid var(--ink); padding:12px 18px; box-shadow:4px 4px 0 0 var(--hot-magenta)" class="disp">MAGENTA</div>
      <div style="background:var(--paper); border:2px solid var(--ink); padding:12px 18px; box-shadow:4px 4px 0 0 var(--electric-cyan)" class="disp">CYAN</div>
    </div></div></body></html>
