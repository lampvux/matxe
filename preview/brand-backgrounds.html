<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">TILED BACKGROUNDS</div>
    <div class="row" style="gap:18px">
      <div style="width:260px; height:120px; background:url('../assets/bg-stars.svg'); image-rendering:pixelated; border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); display:flex; align-items:center; justify-content:center">
        <span class="disp" style="color:var(--lime-zap); font-size:14px">NIGHT</span>
      </div>
      <div style="width:260px; height:120px; background:url('../assets/bg-clouds.svg'); image-rendering:pixelated; border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); display:flex; align-items:center; justify-content:center">
        <span class="disp" style="color:var(--ink); font-size:14px">DAY</span>
      </div>
    </div></div></body></html>
