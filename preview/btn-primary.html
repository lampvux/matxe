<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">BUTTONS — PRIMARY / SECONDARY / DANGER</div>
    <div class="row" style="gap:16px; align-items:center">
      <button class="disp" style="font-size:12px; background:var(--sunshine); color:var(--ink); border:2px solid var(--ink); padding:12px 16px; box-shadow:4px 4px 0 0 var(--ink); cursor:pointer">▶ PLAY</button>
      <button class="disp" style="font-size:12px; background:var(--paper); color:var(--ink); border:2px solid var(--ink); padding:12px 16px; box-shadow:4px 4px 0 0 var(--ink); cursor:pointer">SETTINGS</button>
      <button class="disp" style="font-size:12px; background:var(--cherry); color:var(--paper); border:2px solid var(--ink); padding:12px 16px; box-shadow:4px 4px 0 0 var(--ink); cursor:pointer">GIVE UP</button>
      <button class="disp" style="font-size:12px; background:#c0c0c0; color:#777; border:2px solid #777; padding:12px 16px; cursor:not-allowed">DISABLED</button>
    </div></div></body></html>
