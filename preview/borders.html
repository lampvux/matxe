<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">BORDERS — PIXEL CRISP, ZERO RADIUS</div>
    <div class="row" style="gap:18px; align-items:center">
      <div style="background:var(--paper); border:2px solid var(--ink); padding:12px 16px" class="mono">2px solid (default)</div>
      <div style="background:var(--paper); border:4px solid var(--ink); padding:10px 14px" class="mono">4px solid (loud)</div>
      <div style="background:var(--paper); border:2px dashed var(--ink); padding:12px 16px" class="mono">2px dashed (cut here)</div>
      <div style="background:var(--paper); border:2px dotted var(--ink); padding:12px 16px" class="mono">2px dotted (under construction)</div>
    </div></div></body></html>
