<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">ALERT / TOAST</div>
    <div class="col" style="gap:12px">
      <div style="background:var(--cherry); color:var(--paper); border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); padding:10px 14px; max-width:520px" class="row">
        <span class="disp" style="font-size:12px">!!!</span>
        <span class="disp" style="font-size:12px">YOUR BIKE IS BEING STOLEN!!!</span>
      </div>
      <div style="background:var(--sunshine); color:var(--ink); border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); padding:10px 14px; max-width:520px" class="row">
        <span class="disp" style="font-size:12px">⚠</span>
        <span class="mono" style="font-size:18px">heads up — someone is loitering near your bike.</span>
      </div>
      <div style="background:var(--lime-zap); color:var(--ink); border:2px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); padding:10px 14px; max-width:520px" class="row">
        <span class="disp" style="font-size:12px">+1</span>
        <span class="mono" style="font-size:18px">nice. you watched for 60 seconds straight.</span>
      </div>
    </div></div></body></html>
