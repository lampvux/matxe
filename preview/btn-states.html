<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">BUTTON STATES — REST / HOVER / PRESSED</div>
    <div class="row" style="gap:24px; align-items:center">
      <div class="col" style="gap:6px; align-items:center">
        <button class="disp" style="font-size:12px; background:var(--sunshine); color:var(--ink); border:2px solid var(--ink); padding:12px 16px; box-shadow:4px 4px 0 0 var(--ink)">REST</button>
        <div class="swatch-label">DEFAULT</div>
      </div>
      <div class="col" style="gap:6px; align-items:center">
        <button class="disp" style="font-size:12px; background:var(--electric-cyan); color:var(--ink); border:2px solid var(--ink); padding:12px 16px; box-shadow:4px 4px 0 0 var(--ink)">HOVER</button>
        <div class="swatch-label">INVERT FILL</div>
      </div>
      <div class="col" style="gap:6px; align-items:center">
        <button class="disp" style="font-size:12px; background:var(--sunshine); color:var(--ink); border:2px solid var(--ink); padding:12px 16px; box-shadow:2px 2px 0 0 var(--ink); transform:translate(2px,2px)">PRESS</button>
        <div class="swatch-label">SHIFT 2PX</div>
      </div>
    </div></div></body></html>
