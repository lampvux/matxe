<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">STICKER — SILKSCREEN</div>
    <div class="row" style="gap:24px">
      <div class="stick" style="font-size:22px; background:var(--sunshine); color:var(--ink); padding:6px 10px; border:2px solid var(--ink); box-shadow:var(--shadow-block)">NEW!</div>
      <div class="stick" style="font-size:22px; background:var(--hot-magenta); color:var(--paper); padding:6px 10px; border:2px solid var(--ink); box-shadow:var(--shadow-block)">RAD</div>
      <div class="stick" style="font-size:22px; background:var(--electric-cyan); color:var(--ink); padding:6px 10px; border:2px solid var(--ink); box-shadow:var(--shadow-block)">FREE</div>
      <div class="stick" style="font-size:22px; background:var(--lime-zap); color:var(--ink); padding:6px 10px; border:2px solid var(--ink); box-shadow:var(--shadow-block)">★ HOT</div>
    </div></div></body></html>
