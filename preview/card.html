<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">CARD / PANEL</div>
    <div style="background:var(--paper); border:2px solid var(--ink); box-shadow:6px 6px 0 0 var(--ink); padding:16px 20px; max-width:360px">
      <div class="disp" style="font-size:14px; margin-bottom:8px">★ HUFFY HAULER</div>
      <div class="mono" style="font-size:18px; line-height:1.3; color:var(--ink-soft)">parked at 4:32pm. battery: 78%. last seen: yes (just now).</div>
      <div class="row" style="gap:8px; margin-top:14px">
        <button class="disp" style="font-size:10px; background:var(--sunshine); border:2px solid var(--ink); padding:6px 10px; box-shadow:3px 3px 0 0 var(--ink)">CHECK</button>
        <button class="disp" style="font-size:10px; background:var(--paper); border:2px solid var(--ink); padding:6px 10px; box-shadow:3px 3px 0 0 var(--ink)">DETAILS</button>
      </div>
    </div></div></body></html>
