<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">CHECKBOX / RADIO / TOGGLE</div>
    <div class="row" style="gap:32px; align-items:center">
      <div class="col" style="gap:6px">
        <div class="row" style="gap:8px"><div style="width:20px; height:20px; background:var(--paper); border:2px solid var(--ink); position:relative"><span style="position:absolute; left:2px; top:-4px; font-size:18px" class="disp">×</span></div><span class="mono">honk on tab</span></div>
        <div class="row" style="gap:8px"><div style="width:20px; height:20px; background:var(--paper); border:2px solid var(--ink)"></div><span class="mono">vibrate</span></div>
      </div>
      <div class="col" style="gap:6px">
        <div class="row" style="gap:8px"><div style="width:20px; height:20px; background:var(--paper); border:2px solid var(--ink); display:flex; align-items:center; justify-content:center"><div style="width:8px; height:8px; background:var(--ink)"></div></div><span class="mono">easy</span></div>
        <div class="row" style="gap:8px"><div style="width:20px; height:20px; background:var(--paper); border:2px solid var(--ink)"></div><span class="mono">brutal</span></div>
      </div>
      <div class="col" style="gap:6px; align-items:center">
        <div style="width:54px; height:24px; background:var(--lime-zap); border:2px solid var(--ink); display:flex; align-items:center; justify-content:flex-end; padding:2px"><div style="width:18px; height:16px; background:var(--ink)"></div></div>
        <span class="mono" style="font-size:14px">ALARM ON</span>
      </div>
    </div></div></body></html>
