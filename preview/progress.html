<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
    <div class="card-title">PROGRESS / METER</div>
    <div class="col" style="gap:12px">
      <div class="row" style="gap:10px"><span class="disp" style="font-size:10px; width:80px">VIGILANCE</span>
        <div style="width:340px; height:18px; background:var(--paper); border:2px solid var(--ink); padding:2px"><div style="width:78%; height:14px; background:var(--lime-zap); border-right:2px solid var(--ink)"></div></div>
        <span class="disp" style="font-size:10px">78%</span>
      </div>
      <div class="row" style="gap:10px"><span class="disp" style="font-size:10px; width:80px">BATTERY</span>
        <div style="width:340px; height:18px; background:var(--paper); border:2px solid var(--ink); padding:2px"><div style="width:42%; height:14px; background:var(--sunshine); border-right:2px solid var(--ink)"></div></div>
        <span class="disp" style="font-size:10px">42%</span>
      </div>
      <div class="row" style="gap:10px"><span class="disp" style="font-size:10px; width:80px">PANIC</span>
        <div style="width:340px; height:18px; background:var(--paper); border:2px solid var(--ink); padding:2px"><div style="width:91%; height:14px; background:var(--cherry); border-right:2px solid var(--ink)"></div></div>
        <span class="disp" style="font-size:10px">91%</span>
      </div>
    </div></div></body></html>
